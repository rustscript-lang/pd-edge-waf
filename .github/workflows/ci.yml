name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pd-edge-waf
    steps:
      - uses: actions/checkout@v4
        with:
          path: pd-edge-waf
      - uses: actions/checkout@v4
        with:
          repository: rustscript-lang/rustscript
          ref: 964d8ec7141e89c438ea1810aff36b0d131e0170
          path: rustscript
      - uses: actions/checkout@v4
        with:
          repository: rustscript-lang/pd-edge
          path: pd-edge
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rebuild rules and run smoke test
        run: bash tools/smoke.sh
      - name: Measure default ruleset batch latency
        env:
          WAF_PERF_WARMUP_BATCHES: "2"
          WAF_PERF_BATCHES: "10"
          WAF_PERF_BATCH_SIZE: "10"
          WAF_PERF_JIT_STABLE_REQUESTS: "12"
          WAF_PERF_JIT_MAX_WARMUP_REQUESTS: "128"
          WAF_PERF_ENFORCE_TARGETS: "0"
        run: cargo test --release --test perf -- --ignored --nocapture --test-threads=1
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
